services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: udia-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - udia-network
    restart: unless-stopped

volumes:
  qdrant_storage:

networks:
  udia-network:
    driver: bridge
