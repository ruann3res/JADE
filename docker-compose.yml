services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: jade-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - jade-network
    restart: unless-stopped

volumes:
  qdrant_storage:

networks:
  jade-network:
    driver: bridge
